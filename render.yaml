services:
  - name: dbmongo
    type: redis
    env:
      - MONGO_INITDB_ROOT_USERNAME=root
      - MONGO_INITDB_ROOT_PASSWORD=root
    persistentDisk:
      name: mongo-data
      mountPath: /data/db
      sizeGB: 1

  - name: mongodb_code
    type: web
    env: docker
    dockerfilePath: ./mongoCode/Dockerfile
    envVars:
      - fromService:
          name: dbmongo
          property: MONGO_INITDB_ROOT_USERNAME
      - fromService:
          name: dbmongo
          property: MONGO_INITDB_ROOT_PASSWORD
    ports:
      - 27000:27000

  - name: backend
    type: web
    env: docker
    dockerfilePath: ./backend/Dockerfile
    envVars:
      - fromService:
          name: dbmongo
          property: MONGO_INITDB_ROOT_USERNAME
      - fromService:
          name: dbmongo  
          property: MONGO_INITDB_ROOT_PASSWORD
    ports:
      - 8000:8000

  - name: frontend
    type: web
    env: docker
    dockerfilePath: ./frontend/Dockerfile
    envVars:
      - fromService:
          name: dbmongo
          property: MONGO_INITDB_ROOT_USERNAME
      - fromService:
          name: dbmongo
          property: MONGO_INITDB_ROOT_PASSWORD
    ports:
      - 3000:3000
