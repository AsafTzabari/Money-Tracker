services:
  - name: dbmongo
    type: docker
    env: 
      - name: MONGO_INITDB_ROOT_USERNAME
        value: root
      - name: MONGO_INITDB_ROOT_PASSWORD
        value: root
    buildCommand: docker build -t dbmongo ./mongoDb
    startCommand: docker-entrypoint.sh mongod --bind_ip_all
    ports:
      - 8003:27017
    volumes:
      - name: mongo-data
        path: /data/db

  - name: mongodb_code
    type: docker
    buildCommand: docker build -t mongodb_code ./mongoCode
    env:
      - name: MONGO_URI
        fromSecret: dbmongo-uri
    startCommand: npm start
    ports:
      - 27000:27000

  - name: backend
    type: docker
    buildCommand: docker build -t backend ./backend
    env:
      - name: MONGO_URI
        fromSecret: dbmongo-uri
      - name: MONGO_DB
        value: <YOUR_MONGO_DB>
    startCommand: npm start
    ports:
      - 8000:8000

  - name: frontend
    type: docker
    buildCommand: docker build -t frontend ./frontend
    startCommand: npm start
    ports:
      - 3000:3000

volumes:
  - name: mongo-data

secrets:
  - name: dbmongo-uri
    fromService:
      name: dbmongo
      alias: MONGO_URI
